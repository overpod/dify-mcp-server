name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run check

      - name: Run tests
        run: bun run test

      - name: Build TypeScript
        run: bun run build

      - name: Compile binaries
        run: |
          bun build src/index.ts --compile --target=bun-linux-x64 --outfile dify-mcp-server-linux-x64
          bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile dify-mcp-server-darwin-arm64
          bun build src/index.ts --compile --target=bun-darwin-x64 --outfile dify-mcp-server-darwin-x64
          bun build src/index.ts --compile --target=bun-windows-x64 --outfile dify-mcp-server-windows-x64.exe

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Extract section between this version header and the next version header
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            dify-mcp-server-linux-x64
            dify-mcp-server-darwin-arm64
            dify-mcp-server-darwin-x64
            dify-mcp-server-windows-x64.exe
